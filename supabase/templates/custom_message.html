<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Message from OET Coach</title>
</head>
<body style="margin:0;padding:0;background-color:#f6f1e8;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f6f1e8;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border-radius:16px;border:1px solid #e8dfd0;overflow:hidden;">
          <tr>
            <td style="background:linear-gradient(135deg,#21402f 0%,#5c3d2e 100%);padding:28px 32px;text-align:center;">
              <img src="https://nika-oet.fun/nika/avatar/nika-companion.png" alt="Nika" width="72" height="72" style="display:block;margin:0 auto 12px;border-radius:50%;border:3px solid #f6f1e8;" />
              <p style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:22px;font-weight:700;color:#f6f1e8;">OET Coach</p>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <p style="margin:0 0 16px;font-size:15px;line-height:1.6;color:#4a4038;">
                Hi {{FirstName}},
              </p>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#4a4038;">
                {{MessageBody}}
              </p>
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 24px;">
                <tr>
                  <td style="border-radius:12px;background:#e8a838;">
                    <a href="https://nika-oet.fun/dashboard" style="display:inline-block;padding:14px 32px;font-size:16px;font-weight:600;color:#1a1a1a;text-decoration:none;">
                      Open OET Coach
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:0;padding:14px 16px;background:#faf7f2;border-radius:10px;font-size:12px;line-height:1.5;color:#6b6158;">
                Reply to this email to reach our team at <strong>support@nika-oet.fun</strong>.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
