<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your week with OET Coach</title>
</head>
<body style="margin:0;padding:0;background-color:#f6f1e8;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f6f1e8;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border-radius:16px;border:1px solid #e8dfd0;overflow:hidden;">
          <tr>
            <td style="background:linear-gradient(135deg,#21402f 0%,#5c3d2e 100%);padding:28px 32px;text-align:center;">
              <img src="https://nika-oet.fun/nika/avatar/nika-companion.png" alt="Nika" width="72" height="72" style="display:block;margin:0 auto 12px;border-radius:50%;border:3px solid #f6f1e8;" />
              <p style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:22px;font-weight:700;color:#f6f1e8;">Your week in review</p>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#4a4038;">
                Hi {{ .FirstName }}, here's how your week looked:
              </p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin:0 0 24px;font-size:14px;color:#4a4038;">
                <tr><td style="padding:8px 0;border-bottom:1px solid #e8dfd0;">Study days</td><td align="right" style="padding:8px 0;border-bottom:1px solid #e8dfd0;"><strong>{{ .StudyDays }}/7</strong></td></tr>
                <tr><td style="padding:8px 0;border-bottom:1px solid #e8dfd0;">Minutes practised</td><td align="right" style="padding:8px 0;border-bottom:1px solid #e8dfd0;"><strong>{{ .Minutes }}</strong></td></tr>
                <tr><td style="padding:8px 0;">Strongest focus</td><td align="right" style="padding:8px 0;"><strong>{{ .TopSkill }}</strong></td></tr>
              </table>
              <p style="margin:0 0 20px;font-size:14px;line-height:1.6;color:#6b6158;">
                {{ .NikaTip }}
              </p>
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 24px;">
                <tr>
                  <td style="border-radius:12px;background:#e8a838;">
                    <a href="{{ .ProgressUrl }}" style="display:inline-block;padding:14px 32px;font-size:16px;font-weight:600;color:#1a1a1a;text-decoration:none;">
                      View progress
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-size:12px;color:#6b6158;">
                <strong>Not monitored.</strong> <a href="mailto:support@nika-oet.fun" style="color:#21402f;">support@nika-oet.fun</a>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;background:#faf7f2;border-top:1px solid #e8dfd0;text-align:center;font-size:11px;color:#8a7f72;">
              Nika · OET Coach · noreply@nika-oet.fun · <a href="{{ .UnsubscribeUrl }}" style="color:#8a7f72;">Email preferences</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
